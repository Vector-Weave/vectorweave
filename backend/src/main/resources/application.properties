# Application name
spring.application.name=ezvector-backend

# ========================================
# DATABASE CONFIGURATION (Supabase)
# Values MUST be provided via a .env file or environment variables.
# The application will fail to start if these are not set.
# ========================================
spring.datasource.url=${SUPABASE_URL}?prepareThreshold=0
spring.datasource.username=${SUPABASE_USERNAME}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# ========================================
# JPA / HIBERNATE CONFIG
# ========================================
# Automatically create and update database tables from your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in the console (for debugging)
spring.jpa.show-sql=true


# Specify the PostgreSQL dialect for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================================
# SERVER CONFIG
# ========================================
server.port=8080

# ========================================
# STRIPE CONFIG
# Get your keys from https://dashboard.stripe.com/apikeys
# ========================================
stripe.api.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# ========================================
# SUPABASE JWT CONFIG
# Get your JWT secret from Supabase Dashboard → Settings → API → JWT Secret
# This is used to verify JWT tokens from Supabase Auth
# WARNING: This is DIFFERENT from your anon key! Keep it secret!
# ========================================
supabase.jwt.secret=${SUPABASE_JWT_SECRET}

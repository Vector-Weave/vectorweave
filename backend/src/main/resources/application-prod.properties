# Production Configuration for Railway

# Database Configuration
# Railway provides DATABASE_URL in format: postgresql://user:password@host:port/database
# Spring Boot needs: jdbc:postgresql://host:port/database
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/vectorweave}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Configuration  
server.port=${PORT:8080}

# CORS Configuration
cors.allowed.origins=${FRONTEND_URL:http://localhost:5173}
